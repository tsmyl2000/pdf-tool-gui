name: 打包Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install PyPDF2 pyinstaller

      - name: 打包成EXE
        run: pyinstaller -F -w pdf_gui_tool.py

      - name: 上传EXE文件
        uses: actions/upload-artifact@v4
        with:
          name: pdf-tool-exe
          path: dist/*.exe
